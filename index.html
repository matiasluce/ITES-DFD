<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITES-DFD</title>
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
</head>
<body>
<!-- CONFIRM MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>⚠ Reiniciar diagrama</h2>
    <p>Se eliminarán todos los nodos y flechas del diagrama y volverá al estado inicial.<br>¿Estás seguro?</p>
    <div id="modal-btns">
      <button id="modal-yes" onclick="doReset()">Sí, reiniciar</button>
      <button id="modal-no"  onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div id="toolbar">
  <h1>⬡ ITES-DFD</h1>
  <div class="sep"></div>

  <!-- Terminal -->
  <button class="tool-btn" id="tool-terminal" onclick="selectTool('terminal')">
    <svg width="90" height="38" viewBox="0 0 90 38">
      <rect x="2" y="2" width="86" height="34" rx="17" ry="17" fill="white" stroke="#3a7bd5" stroke-width="2.5"/>
      <text x="45" y="19" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" font-family="Arial" fill="#1a1f2e">Terminal</text>
    </svg>
    Terminal
  </button>

  <!-- Input -->
  <button class="tool-btn" id="tool-input" onclick="selectTool('input')">
    <svg width="90" height="38" viewBox="0 0 90 38">
      <polygon points="12,2 88,2 78,36 2,36" fill="white" stroke="#3a7bd5" stroke-width="2.5"/>
      <text x="46" y="19" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" font-family="Arial" fill="#1a1f2e">Entrada</text>
    </svg>
    Entrada
  </button>

  <!-- Process -->
  <button class="tool-btn" id="tool-process" onclick="selectTool('process')">
    <svg width="90" height="38" viewBox="0 0 90 38">
      <rect x="2" y="2" width="86" height="34" fill="white" stroke="#3a7bd5" stroke-width="2.5"/>
      <text x="45" y="19" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" font-family="Arial" fill="#1a1f2e">Proceso</text>
    </svg>
    Proceso
  </button>

  <!-- Decision -->
  <button class="tool-btn" id="tool-decision" onclick="selectTool('decision')">
    <svg width="90" height="44" viewBox="0 0 90 44">
      <polygon points="45,2 88,22 45,42 2,22" fill="white" stroke="#3a7bd5" stroke-width="2.5"/>
      <text x="45" y="22" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" font-family="Arial" fill="#1a1f2e">Decisión</text>
    </svg>
    Decisión
  </button>

  <!-- Print — rectangle with a single wave along the bottom (reference shape) -->
  <button class="tool-btn" id="tool-print" onclick="selectTool('print')">
    <svg width="90" height="38" viewBox="0 0 90 38">
      <path d="M2,2 H88 V28 C68,34 22,22 2,28 Z"
            fill="white" stroke="#3a7bd5" stroke-width="2.5"/>
      <text x="45" y="14" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" font-family="Arial" fill="#1a1f2e">Imprimir</text>
    </svg>
    Imprimir
  </button>

  <div class="sep"></div>

  <button class="action-btn" id="btn-delete" onclick="deleteSelected()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
    </svg>
    Eliminar
  </button>

  <div class="sep"></div>

  <button class="action-btn" id="btn-reset" onclick="askReset()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
    </svg>
    Reiniciar
  </button>

  <button class="action-btn" id="btn-save" onclick="saveDiagram()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
    </svg>
    Guardar SVG
  </button>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="arrows" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah"  markerWidth="8" markerHeight="5.6" refX="7.2" refY="2.8" orient="auto">
          <polygon points="0 0,8 2.8,0 5.6" fill="#5b9cf6"/>
        </marker>
        <marker id="ahs" markerWidth="8" markerHeight="5.6" refX="7.2" refY="2.8" orient="auto">
          <polygon points="0 0,8 2.8,0 5.6" fill="#f0a500"/>
        </marker>
      </defs>
    </svg>
    <div id="ghost"></div>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in" onclick="zoomIn()" title="Acercar">+</button>
    <div id="zoom-level" onclick="zoomReset()" title="Restablecer zoom">100%</div>
    <button class="zoom-btn" id="zoom-out" onclick="zoomOut()" title="Alejar">−</button>
  </div>
</div>

<div id="status-bar">Selecciona una forma del toolbar y haz clic sobre un nodo para insertarla después de él.</div>

<script src="script.js"></script>
</body>
</html>
